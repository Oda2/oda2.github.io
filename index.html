<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Oda | SRE Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <header>
    <div class="left">
      <h1>Renato Oda</h1>
      <p id="title"></p>
    </div>

    <div class="right">
      <div class="links">
        <a href="https://github.com/oda2" target="_blank">
          <img src="https://img.shields.io/badge/GitHub-oda2-181717?logo=github">
        </a>
        <a href="https://www.linkedin.com/in/renatooda/" target="_blank">
          <img src="https://img.shields.io/badge/LinkedIn-Renato%20Oda-0A66C2?logo=linkedin">
        </a>
        <a href="mailto:renato.oda2@gmail.com" class="email">Contact</a>
      </div>

      <select id="lang">
        <option value="pt">PT</option>
        <option value="en">EN</option>
        <option value="es">ES</option>
      </select>
    </div>
  </header>

  <!-- DASHBOARD -->
  <section class="dashboard">
    <div class="metric">
      <span>STATUS</span>
      <strong class="ok">● OPERATIONAL</strong>
    </div>
    <div class="metric">
      <span>THROUGHPUT</span>
      <strong id="rpm">20k RPM</strong>
    </div>
    <div class="metric">
      <span>AVAILABILITY</span>
      <strong>99.9%</strong>
    </div>
    <div class="metric">
      <span>INCIDENTS</span>
      <strong>LOW</strong>
    </div>
  </section>

  <!-- PROFILE -->
  <section class="card profile">
    <img id="avatar">
    <div>
      <h2 id="name"></h2>
      <p id="bio"></p>
    </div>
  </section>

  <!-- ABOUT -->
  <section class="card">
    <h3 data-i18n="about"></h3>
    <p data-i18n="about_text"></p>
  </section>

  <!-- EXPERIENCE -->
  <section class="card">
    <h3 data-i18n="experience"></h3>
    <div id="experience"></div>
  </section>

  <!-- PROJECTS -->
  <section class="card">
    <h3 data-i18n="projects"></h3>
    <div id="projects"></div>
  </section>

  <!-- SKILLS -->
  <section class="card">
    <h3 data-i18n="skills"></h3>
    <ul id="skills"></ul>
  </section>

  <footer>
    <p>🟢 Systems Operating</p>
  </footer>

</div>

<script src="i18n.js"></script>
<script src="main.js"></script>
</body>
</html>
